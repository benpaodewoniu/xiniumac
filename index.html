<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xiniu Mac - 好用的 Mac App 推荐</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.5;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 18px 20px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid #e8e8ed;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav a {
      text-decoration: none;
      color: #86868b;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    nav a:hover { color: #1d1d1f; }
    nav a.active { color: #1d1d1f; }

    header {
      text-align: center;
      padding: 60px 20px 40px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 10px;
      font-size: 1.1rem;
      color: #86868b;
    }

    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 20px 30px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 18px;
      border: 1px solid #d2d2d7;
      border-radius: 20px;
      background: #fff;
      color: #1d1d1f;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: #0071e3; color: #0071e3; }
    .filter-btn.active { background: #0071e3; color: #fff; border-color: #0071e3; }

    .grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: box-shadow 0.2s;
    }

    .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

    .card img {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      flex-shrink: 0;
    }

    .card-body { flex: 1; min-width: 0; }

    .card-body h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card-body .tag {
      display: inline-block;
      font-size: 0.7rem;
      color: #86868b;
      background: #f5f5f7;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .card-body p {
      font-size: 0.85rem;
      color: #6e6e73;
      margin-bottom: 10px;
    }

    .card-body a {
      font-size: 0.85rem;
      color: #0071e3;
      text-decoration: none;
      font-weight: 500;
    }

    .card-body a:hover { text-decoration: underline; }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: #86868b;
      font-size: 0.8rem;
      border-top: 1px solid #e8e8ed;
    }

    @media (max-width: 680px) {
      header h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="active">App 推荐</a>
  <a href="tips.html">小技巧</a>
</nav>

<header>
  <h1>Xiniu Mac</h1>
  <p>我在用的 Mac App，分享给你</p>
</header>

<div class="filter-bar">
  <button class="filter-btn active" data-cat="all">全部</button>
  <button class="filter-btn" data-cat="efficiency">效率工具</button>
  <button class="filter-btn" data-cat="dev">开发工具</button>
  <button class="filter-btn" data-cat="network">网络工具</button>
  <button class="filter-btn" data-cat="media">影音媒体</button>
  <button class="filter-btn" data-cat="system">系统工具</button>
</div>

<div class="grid" id="app-grid"></div>

<footer>Xiniu Mac &copy; 2026</footer>

  {

    url: "https://iterm2.com"
  },
  {
    name: "Sublime Text",
    icon: "icons/sublimetext.png",

  {

  // 系统工具
  {

  {

  {

  },
  {
    name: "Windows App",
    icon: "icons/windowsapp.png",
    cat: "system",
    desc: "微软官方远程桌面客户端，从 Mac 连接 Windows PC。",
    url: "https://apps.apple.com/app/windows-app/id1295203466"
  },
];

const grid = document.getElementById("app-grid");
const buttons = document.querySelectorAll(".filter-btn");

function render(cat) {
  grid.innerHTML = "";
  const list = cat === "all" ? apps : apps.filter(a => a.cat === cat);
  list.forEach(app => {
    if (app.hidden) return;
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.cat = app.cat;

    const catLabels = {
      efficiency: "效率工具", dev: "开发工具", network: "网络工具",
      media: "影音媒体", system: "系统工具"
    };

    card.innerHTML = `
      <img src="${app.icon}" alt="${app.name}" loading="lazy">
      <div class="card-body">
        <h3>${app.name}</h3>
        <span class="tag">${catLabels[app.cat]}</span>
        <p>${app.desc}</p>
        <a href="${app.url}" target="_blank" rel="noopener">获取 &rarr;</a>
      </div>
    `;
    grid.appendChild(card);
  });
}

buttons.forEach(btn => {
  btn.addEventListener("click", () => {
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render(btn.dataset.cat);
  });
});

render("all");
</script>

</body>
</html>
